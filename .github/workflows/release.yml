name: Release

on:
  push:
    tags:
      - "v*.*.*"   # ej: v1.0.0, v1.2.3

jobs:
  test:
    name: Tests antes de publicar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest "mcp[cli]>=1.0" reportlab
      - run: python -m pytest tests/ -q

  release:
    name: Crear release con ZIP
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extraer versión del tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Actualizar versión en package.xml
        run: |
          sed -i "s|<version>.*</version>|<version>${{ steps.version.outputs.VERSION }}</version>|" package.xml
          sed -i "s|<date>.*</date>|<date>$(date +%Y-%m-%d)</date>|" package.xml

      - name: Construir ZIP del addon
        run: |
          ZIP_NAME="WoodOptimizer-${{ steps.version.outputs.VERSION }}.zip"
          zip -r "$ZIP_NAME" . \
            --exclude "*.git*" \
            --exclude "refs/*" \
            --exclude "tests/*" \
            --exclude "demo_closet.py" \
            --exclude "AGENTS.md" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude ".github/*"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Publicar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "WoodOptimizer v${{ steps.version.outputs.VERSION }}"
          body: |
            ## WoodOptimizer v${{ steps.version.outputs.VERSION }}

            ### Instalación
            Descarga el ZIP y descomprímelo en tu carpeta de addons de FreeCAD:
            - **Linux**: `~/.local/share/FreeCAD/Mod/WoodOptimizer/`
            - **Windows**: `%APPDATA%\FreeCAD\Mod\WoodOptimizer\`
            - **macOS**: `~/Library/Application Support/FreeCAD/Mod/WoodOptimizer/`

            O instala directamente desde el **Addon Manager** de FreeCAD.

            ### Dependencias Python
            ```
            pip install "mcp[cli]>=1.0" reportlab
            ```
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
